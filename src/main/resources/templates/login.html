<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4ff; }

        .container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #0d47a1; }
        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .home-link {
            text-align: center;
            margin-top: 15px;
        }
        .home-link a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Admin Login</h2>

        <p class="error" th:if="${param.error}">Invalid username or password!</p>

        <form th:action="@{/admin/login}" method="post">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required/>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required/>

            <button type="submit">Login</button>
        </form>

        <div class="home-link">
            <a th:href="@{/}">← Back to Home</a>
        </div>
    </div>
</body>
</html>
