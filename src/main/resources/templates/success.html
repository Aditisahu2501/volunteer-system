<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration Successful</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4ff; }

        .container {
            text-align: center;
            margin-top: 120px;
        }
        .card {
            display: inline-block;
            background: white;
            padding: 50px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .tick { font-size: 60px; }
        h2 { color: #1a73e8; margin: 15px 0 10px; font-size: 26px; }
        p { color: #555; margin-bottom: 25px; }
        a {
            background: #1a73e8;
            color: white;
            padding: 10px 25px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }
        a:hover { background: #0d47a1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="tick">✅</div>
            <h2>Registration Successful!</h2>
            <p>Thank you for volunteering with NayePankh Foundation.<br>
               We will get in touch with you soon.</p>
            <a th:href="@{/}">Back to Home</a>
        </div>
    </div>
</body>
</html>
